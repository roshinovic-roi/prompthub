<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptHub — דשבורד פעילות</title>
<style>
  :root{
    --bg:#0c0a14;
    --bg-panel:#15121f;
    --ink:#f1eefc;
    --ink-dim:#a39bc4;
    --accent:#7c5cff;
    --good:#3ddc97;
    --bad:#ff6b6b;
    --line:#2a2440;
    --mono: 'SF Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
  .wrap{max-width:920px;margin:0 auto;padding:32px 18px 60px;}
  h1{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--ink-dim);font-size:13.5px;margin:0 0 28px;}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:30px;}
  .card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .card .num{font-size:28px;font-weight:700;}
  .card .lbl{color:var(--ink-dim);font-size:12.5px;margin-top:4px;}
  .card.good .num{color:var(--good);}
  .card.bad .num{color:var(--bad);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--bg-panel);
    border-radius:12px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);}
  th{color:var(--ink-dim);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-family:var(--mono);}
  .pill.ok{background:#3ddc9722;color:var(--good);}
  .pill.fail{background:#ff6b6b22;color:var(--bad);}
  .email{font-family:var(--mono);font-size:12.5px;}
  .time{color:var(--ink-dim);font-size:12px;white-space:nowrap;}

  .loading,.empty{text-align:center;color:var(--ink-dim);padding:40px 0;}
  .refresh{position:fixed;left:18px;bottom:18px;background:var(--accent);color:#fff;border:none;
    border-radius:50px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;}

  @media (max-width:560px){
    th:nth-child(4), td:nth-child(4){display:none;} /* hide source url on mobile */
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 PromptHub — דשבורד פעילות</h1>
  <p class="sub">מעקב חי על הרשמות, אירועי CAPI והתראות טלגרם מדף ה-/go</p>

  <div class="cards" id="cards">
    <div class="loading">טוען נתונים...</div>
  </div>

  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th>זמן</th>
        <th>מייל</th>
        <th>CAPI</th>
        <th>טלגרם</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="empty" id="emptyMsg" style="display:none">אין הרשמות עדיין</div>
</div>

<button class="refresh" onclick="load()">↻ רענון</button>

<script>
const SUPA_URL = 'https://qfjngabqhxbpnvfssijq.supabase.co';
const SUPA_KEY = 'sb_publishable__VyQ0LyxUDbLQosfGAEudg_r-AKm8cq';

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleString('he-IL', { timeZone: 'Asia/Jerusalem', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

async function load(){
  document.getElementById('cards').innerHTML = '<div class="loading">טוען נתונים...</div>';

  const [leadsRes, viewsRes] = await Promise.all([
    fetch(`${SUPA_URL}/rest/v1/lead_events?select=*&order=created_at.desc&limit=200`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    }),
    fetch(`${SUPA_URL}/rest/v1/page_views?select=id`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    })
  ]);
  const rows = await leadsRes.json();
  const views = await viewsRes.json();

  const totalViews = views.length;
  const total = rows.length;
  const capiOk = rows.filter(r => r.capi_success).length;
  const tgOk = rows.filter(r => r.telegram_success).length;
  const capiRate = total ? Math.round((capiOk/total)*100) : 0;
  const tgRate = total ? Math.round((tgOk/total)*100) : 0;
  const convRate = totalViews ? Math.round((total/totalViews)*100) : 0;

  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="num">${totalViews}</div><div class="lbl">כניסות לדף הנחיתה</div></div>
    <div class="card"><div class="num">${total}</div><div class="lbl">סה"כ הרשמות (מייל)</div></div>
    <div class="card good"><div class="num">${convRate}%</div><div class="lbl">אחוז המרה (הרשמות/כניסות)</div></div>
    <div class="card ${capiRate>=80?'good':'bad'}"><div class="num">${capiRate}%</div><div class="lbl">הצלחת CAPI (${capiOk}/${total})</div></div>
    <div class="card ${tgRate>=80?'good':'bad'}"><div class="num">${tgRate}%</div><div class="lbl">הצלחת טלגרם (${tgOk}/${total})</div></div>
  `;

  const tbody = document.getElementById('tbody');
  const tbl = document.getElementById('tbl');
  const emptyMsg = document.getElementById('emptyMsg');

  if (!total) {
    tbl.style.display = 'none';
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';
  tbl.style.display = 'table';

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="time">${fmtTime(r.created_at)}</td>
      <td class="email">${r.email}</td>
      <td><span class="pill ${r.capi_success ? 'ok' : 'fail'}">${r.capi_success ? '✓ נשלח' : '✗ נכשל'}</span></td>
      <td><span class="pill ${r.telegram_success ? 'ok' : 'fail'}">${r.telegram_success ? '✓ נשלח' : '✗ נכשל'}</span></td>
    </tr>
  `).join('');
}

load();
</script>
</body>
</html>
